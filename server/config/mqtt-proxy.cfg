global
    log stdout format raw local0

resolvers podman
    nameserver dns 10.89.0.1:53
    resolve_retries 30
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

defaults
    mode http
    timeout connect 5s
    timeout client 86400s
    timeout server 86400s
    timeout tunnel 86400s
    timeout http-keep-alive 86400s
    timeout http-request 10s

frontend mqtt
    bind :9003
    default_backend mosquitto

backend mosquitto
    http-request set-src hdr(X-Real-IP)
    server mosquitto mosquitto:9001 send-proxy-v2 resolvers podman init-addr none
