name: Release

on:
  push:
    tags:
      - v*

jobs:
  build-firmware:
    uses: ./.github/workflows/firmware.yml
  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build-firmware]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
      - run: |
          mkdir -p firmware
          mv firmware-monolith firmware/monolith
          mv .github/scripts/flash.* .
          zip -r monolith-${{ github.ref_name }}.zip firmware flash.*
      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: monolith-${{ github.ref_name }}.zip
          commit: ${{ github.sha }}
          tag: ${{ github.ref_name }}
          body: |
            ### Monolith ${{ github.ref_name }}
            Please read documentation at https://github.com/CreatOurCar/monolith
